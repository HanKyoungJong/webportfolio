<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header('projects')}"></div>
<main class="container page">
    <section class="page-head">
        <p class="eyebrow">Project Detail</p>
        <h1>프로젝트</h1>
        <p class="lead">프로젝트 내용, 기술 스택, 배운 점을 경력기술서 스타일로 정리했습니다.</p>
    </section>

    <section class="project-list">
        <article class="project-card card" th:each="project : ${projects}">
            <div class="meta-row">
                <span class="badge" th:text="${project.company}"></span>
            </div>
            <h2 th:text="${project.title}"></h2>

            <div class="project-section">
                <h3>프로젝트 내용</h3>
                <ul class="bullet-list">
                    <li th:each="desc : ${project.descriptions}" th:text="${desc}"></li>
                </ul>
            </div>

            <div class="project-section">
                <h3>사용 기술 스택</h3>
                <div class="chip-wrap">
                    <span class="chip" th:each="stack : ${project.techStacks}" th:text="${stack}"></span>
                </div>
            </div>

            <div class="project-section">
                <h3>배운 점</h3>
                <ul class="bullet-list accent">
                    <li th:each="learning : ${project.learnings}" th:text="${learning}"></li>
                </ul>
            </div>
        </article>
    </section>
</main>
</body>
</html>
